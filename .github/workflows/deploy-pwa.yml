name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'land-converter-pwa/**'
      - '.github/workflows/deploy-pwa.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'land-converter-pwa/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./land-converter-pwa
        run: npm ci --legacy-peer-deps
        
      - name: Build project
        working-directory: ./land-converter-pwa
        run: npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './land-converter-pwa/dist'

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
